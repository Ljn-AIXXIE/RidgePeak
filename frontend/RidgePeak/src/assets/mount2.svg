<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
    <defs>
        <filter id="roughEdge" x="-5%" y="-5%" width="110%" height="110%">
            <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </defs>
    <!-- 主山体轮廓 -->
    <path d="M100,350 Q180,180 260,300 Q320,200 390,240 Q450,150 520,280 Q580,220 660,180 Q720,250 800,350" fill="none" stroke="#cbc0bc" stroke-width="2.5" stroke-opacity="0.4" filter="url(#roughEdge)"/>
    <!-- 侧峰纹理线 -->
    <path d="M150,320 Q200,230 280,290" fill="none" stroke="#e8dfd8" stroke-width="1.2" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <path d="M340,280 Q400,200 460,260" fill="none" stroke="#e8dfd8" stroke-width="1.2" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <path d="M520,300 Q600,210 680,270" fill="none" stroke="#e8dfd8" stroke-width="1.2" stroke-opacity="0.25" stroke-dasharray="2 3"/>
    <!-- 山脚苔点 -->
    <circle cx="180" cy="340" r="2" fill="#b7afb0" opacity="0.3"/>
    <circle cx="260" cy="310" r="1.5" fill="#b7afb0" opacity="0.3"/>
    <circle cx="420" cy="280" r="2" fill="#b7afb0" opacity="0.3"/>
    <circle cx="560" cy="320" r="1.8" fill="#b7afb0" opacity="0.3"/>
    <circle cx="680" cy="280" r="2" fill="#b7afb0" opacity="0.3"/>
</svg>